openapi: 3.0.0
info:
  title: TourGuide AI RAG API
  version: 1.0.0
  description: |
    Multimodal AI system supporting:
    - Text-based RAG search
    - Image understanding + contextual chat
    - Session-based memory chat system

servers:
  - url: http://localhost:3000/api

paths:

  /chat:
    post:
      summary: Send a chat message (RAG + memory + optional image context)
      tags:
        - Chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - message
              properties:
                sessionId:
                  type: string
                  example: user123
                message:
                  type: string
                  example: What is Sigiriya?
      responses:
        200:
          description: AI response generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  sessionId:
                    type: string
                  response:
                    type: string
                  imageContext:
                    type: string
                    nullable: true
                  history:
                    type: array

  /chat/set-image-context:
    post:
      summary: Store image context for conversational memory
      tags:
        - Chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - imageContext
              properties:
                sessionId:
                  type: string
                  example: user123
                imageContext:
                  type: string
                  example: Sigiriya Rock Fortress in Sri Lanka
      responses:
        200:
          description: Image context stored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  imageContext:
                    type: string

  /chat/history/{sessionId}:
    get:
      summary: Get chat history for a session
      tags:
        - Chat
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
          example: user123
      responses:
        200:
          description: Chat history retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  history:
                    type: array
                    items:
                      type: object
                  imageContext:
                    type: string
                    nullable: true

  /image-search:
    post:
      summary: Upload image and get AI understanding + RAG response
      tags:
        - Image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
      responses:
        200:
          description: Image processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  topic:
                    type: string
                    description: Short 2-3 word label
                  identifiedSubject:
                    type: string
                  data:
                    type: object